<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="profile-section">
            <img src="photo1.jpeg" alt="My Avatar" class="avatar">
            <div class="bio">
                <h1>L Mohit Jain</h1>
                <p>First-year Engineering student at RVCE. Passionate about AI/ML and building projects</p>
            </div>
        </header>

        <hr>

        <section class="info-section">
            <h2>Task Master</h2>
            <p>Use this app to track your daily goals and engineering milestones.</p>
        </section>

        <main class="todo-wrapper">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="What needs to be done?">
                <button id="add-btn">Add Task</button>
            </div>

            <ul id="task-list">
                </ul>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
